apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nousresearch-live
  labels:
    dokploy-fleet/project: nousresearch
  annotations:
    cert-manager.io/issuer: letsencrypt-prod-cloudflare
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nousresearch.lol
      secretName: nousresearch-live-tls
  rules:
    - host: nousresearch.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nousresearch
                port:
                  number: 80
