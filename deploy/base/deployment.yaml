apiVersion: apps/v1
kind: Deployment
metadata:
  name: nousresearch
  labels:
    app.kubernetes.io/name: nousresearch
    dokploy-fleet/project: nousresearch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nousresearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nousresearch
        dokploy-fleet/project: nousresearch
    spec:
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: nousresearch
          image: app-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
